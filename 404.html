<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Página no encontrada · EBTOOLS</title>
  <link rel="icon" href="assets/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F47B20;
      --orange-dark: #D4610A;
      --black: #0A0A0A;
      --gray-700: #3A3A3A;
      --gray-500: #737373;
      --gray-200: #E8E8E8;
      --gray-100: #F5F5F5;
      --white: #FFFFFF;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    @keyframes page-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      animation: page-in 0.4s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .logo {
      display: inline-block;
      margin-bottom: 48px;
    }
    .logo img { height: 44px; width: auto; display: block; }

    .error-code {
      font-size: clamp(6rem, 20vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--orange);
      margin-bottom: 16px;
    }

    .error-title {
      font-size: clamp(1.25rem, 3vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--black);
      margin-bottom: 12px;
    }

    .error-sub {
      font-size: 0.95rem;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--orange);
      color: var(--white);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 10px;
      letter-spacing: -0.01em;
      border: none;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      box-shadow: 0 2px 12px rgba(244,123,32,0.28);
    }
    .btn-primary:hover { background: var(--orange-dark); }
    .btn-primary:active { transform: scale(0.97); }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--gray-200);
      border-radius: 2px;
      margin: 40px auto 32px;
    }

    .footer-hint {
      font-size: 0.8rem;
      color: var(--gray-500);
    }
    .footer-hint a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" class="logo" aria-label="EBTOOLS inicio">
    <img src="assets/logo.png" alt="EBTOOLS">
  </a>

  <div class="error-code">404</div>

  <h1 class="error-title">Página no encontrada</h1>

  <p class="error-sub">
    El link que seguiste no existe o fue movido.<br>
    Volvé al inicio y encontrá todo lo que necesitás.
  </p>

  <a href="index.html" class="btn-primary">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver al inicio
  </a>

  <div class="divider"></div>

  <p class="footer-hint">
    ¿Buscás algo en particular?
    <a href="index.html#productos">Ver productos</a>
    &nbsp;·&nbsp;
    <a href="https://wa.me/5491171349389?text=Hola!%20Quiero%20consultar%20sobre%20sus%20productos." target="_blank" rel="noopener">WhatsApp</a>
  </p>
</div>

</body>
</html>
